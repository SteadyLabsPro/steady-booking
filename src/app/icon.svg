<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brand ground: the logo's cream, rounded to a tab-friendly tile. -->
  <rect width="32" height="32" rx="7" fill="#f4ebdd" />
  <!-- TH monogram in a slim, high-contrast serif to echo the logo,
       the H dropped slightly below the T, barely touching (not overlapped). -->
  <g
    font-family="'Times New Roman', 'Iowan Old Style', Georgia, serif"
    font-size="21"
    font-weight="400"
    fill="#16394b"
  >
    <text x="11" y="21.5" text-anchor="middle">T</text>
    <text x="21" y="23.5" text-anchor="middle">H</text>
  </g>
</svg>
