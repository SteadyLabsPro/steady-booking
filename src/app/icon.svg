<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brand ground: the logo's cream, rounded to a tab-friendly tile. -->
  <rect width="32" height="32" rx="7" fill="#f4ebdd" />
  <!-- Interlocked TH monogram in a high-contrast serif to echo Fraunces,
       with the H dropped slightly below the T as in the logo. -->
  <g
    font-family="'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif"
    font-size="20"
    font-weight="600"
    fill="#16394b"
  >
    <text x="11.6" y="21.5" text-anchor="middle">T</text>
    <text x="19.8" y="24" text-anchor="middle">H</text>
  </g>
</svg>
